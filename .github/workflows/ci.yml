name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-test-lint-sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Dependencies installieren
        run: npm ci --ignore-scripts

      - name: Lint ausführen
        run: npm run lint

      # Tests + Coverage (Vitest)
      - name: Tests ausführen (mit Coverage)
        run: npm run test:ci

      - name: Build ausführen
        run: npm run build

      - name: Test- & Coverage-Artefakte hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-and-coverage
          path: |
            coverage/
          if-no-files-found: ignore

      # ESLint JSON für Sonar
      - name: Lint für Sonar ausführen
        run: npm run lint:sonar

      - name: Lint-Report hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: reports/eslint/
          if-no-files-found: ignore

      # SonarCloud-Analyse mit Coverage & ESLint
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=DocFaust_my-songbook
            -Dsonar.organization=docfaust

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: General
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Dependencies installieren
        run: npm ci --ignore-scripts

      # npm audit – bricht den Build nicht ab, zeigt aber Probleme
      - name: npm audit
        run: |
          mkdir -p reports/npm-audit
          npm audit --audit-level=high --json > reports/npm-audit/npm-audit.json || true

      - name: npm-audit-Report hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: reports/npm-audit/
          if-no-files-found: ignore

      - name: Cache Dependency-Check data
        uses: actions/cache@v4
        with:
          path: dc-data
          key: dc-data-${{ runner.os }}
          restore-keys: |
            dc-data-${{ runner.os }}-

      - name: OWASP Dependency Check
        timeout-minutes: 8
        env:
          NVDAPIKEY: ${{ secrets.NVDAPIKEY }}
        continue-on-error: true
        run: npm run owasp

      - name: OWASP-Report hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check
          path: dependency-check-report/
          if-no-files-found: ignore
