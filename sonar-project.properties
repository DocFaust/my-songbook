sonar.projectKey=DocFaust_my-songbook
sonar.organization=docfaust

sonar.sources=src
sonar.tests=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**

# Tests liegen unter src/ – ohne diese Patterns zählt Sonar sie als ungetesteten Quellcode
sonar.test.inclusions=**/__tests__/**,**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx

sonar.coverage.exclusions=**/__tests__/**,**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx,src/main.jsx,src/setupTests.js,**/ImportButton.jsx,**/InputArea.jsx,**/SongList.jsx,**/SongEditorLayout.jsx,**/SongDetail.jsx,**/SongEditor/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.eslint.reportPaths=reports/eslint/eslint-sonar.json
